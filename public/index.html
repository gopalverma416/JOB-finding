<script>
"use strict";
/* =========================================================================
   DevHunt — SWE Job Hunting Companion & AI Application Tracker
   Single-file, dependency-free (Tailwind CDN only). All state in localStorage.
   ========================================================================= */

/* ----------------------------- Constants ------------------------------- */
const STORAGE_KEY = "devhunt.state.v1";
const SCHEMA_VERSION = 1;

const COLUMNS = [
  { id: "wishlist",     label: "Wishlist",     accent: "#8aa0bd" },
  { id: "applied",      label: "Applied",      accent: "#5b8cff" },
  { id: "interviewing", label: "Interviewing", accent: "#fbbf24" },
  { id: "offer",        label: "Offer",        accent: "#34d399" },
  { id: "rejected",     label: "Rejected",     accent: "#f87171" }
];
const COLUMN_IDS = COLUMNS.map(c => c.id);
const COLUMN_LABEL = Object.fromEntries(COLUMNS.map(c => [c.id, c.label]));

const SUBSTAGES = [
  { key: "oa",           label: "OA" },
  { key: "phoneScreen",  label: "Phone Screen" },
  { key: "technical",    label: "Technical" },
  { key: "systemDesign", label: "System Design" },
  { key: "behavioral",   label: "Behavioral" }
];

const CS_TOPICS = [
  { key: "scalability",   label: "Scalability & Horizontal Scaling" },
  { key: "caching",       label: "Caching (CDN, Redis, LRU)" },
  { key: "loadBalancers", label: "Load Balancers" },
  { key: "sharding",      label: "Database Sharding & Replication" },
  { key: "messaging",     label: "Message Queues & Streaming" },
  { key: "os",            label: "Operating Systems & Concurrency" },
  { key: "networking",    label: "Networking (TCP/IP, DNS, HTTP)" },
  { key: "consistency",   label: "CAP Theorem & Consistency" }
];

const ROLE_OPTIONS = ["Frontend", "Backend", "Fullstack", "Mobile", "DevOps / SRE", "ML / Data", "Embedded", "Security"];
const DIFFICULTIES = ["Easy", "Medium", "Hard"];
const DSA_TOPICS = ["Arrays", "Strings", "Hashing", "Two Pointers", "Sliding Window", "Stack", "Queue",
  "Linked List", "Trees", "Graphs", "Heap", "Greedy", "Backtracking", "Dynamic Programming", "Binary Search", "Math", "Tries"];

/* ----------------------------- Utilities ------------------------------- */
function uid(prefix) {
  return (prefix || "id") + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function nowISO() { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().slice(0, 10); }

function escapeHtml(value) {
  const s = value == null ? "" : String(value);
  return s.replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}
function escapeAttr(value) { return escapeHtml(value); }

function clampNum(n, lo, hi) { n = Number(n); if (!isFinite(n)) n = lo; return Math.max(lo, Math.min(hi, n)); }

function daysAgo(n) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - n);
  return d;
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function relTime(iso) {
  if (!iso) return "";
  const then = new Date(iso).getTime();
  if (isNaN(then)) return "";
  const diff = Date.now() - then;
  const day = 86400000;
  if (diff < 60000) return "just now";
  if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
  if (diff < day) return Math.floor(diff / 3600000) + "h ago";
  if (diff < 7 * day) return Math.floor(diff / day) + "d ago";
  return fmtDate(iso);
}
function parseStack(raw) {
  if (Array.isArray(raw)) return raw.map(s => String(s).trim()).filter(Boolean);
  return String(raw || "")
    .split(/[,;\n|/]+/)
    .map(s => s.trim())
    .filter(Boolean);
}
function fmtMoney(n) {
  const v = Number(n);
  if (!isFinite(v) || v <= 0) return "—";
  return "$" + v.toLocaleString();
}
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e || "").trim()); }

/* Demo/seed data now lives server-side (src/seedData.js); the "Reset Data"
   button calls POST /api/reset. The frontend no longer holds a seed copy. */

/* --------------------------- State Management -------------------------- */
/* STATE is an in-memory mirror of the MongoDB-backed REST API. The render
   layer reads from STATE synchronously; every mutation hits the server first
   (via the `repo` helpers), then patches STATE and re-renders. localStorage is
   used ONLY as an offline read-cache so the UI still shows last-known data if
   the API is unreachable. Each record's identity is its Mongo `id` field. */
let STATE = null;
let OFFLINE = false;
let profileSaveTimer = null;
let pendingProfilePatch = {};
const API = "/api";
const CACHE_KEY = STORAGE_KEY; // reuse "devhunt.state.v1" as the offline cache key

/* Thin fetch wrapper: JSON in/out, throws Error(message) on non-2xx. */
async function apiCall(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API + path, opts);
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch (_) { data = null; }
  if (!res.ok) throw new Error((data && data.error) ? data.error : ("Request failed (" + res.status + ")"));
  return data;
}

function assembleState(jobs, contacts, leetcode, profile) {
  profile = profile || {};
  const out = {
    activeView: profile.activeView || "board",
    jobs: Array.isArray(jobs) ? jobs : [],
    contacts: Array.isArray(contacts) ? contacts : [],
    leetcode: Array.isArray(leetcode) ? leetcode : [],
    csChecklist: (profile.csChecklist && typeof profile.csChecklist === "object") ? profile.csChecklist : {},
    goals: (profile.goals && typeof profile.goals === "object") ? profile.goals : { Easy: 50, Medium: 75, Hard: 30 },
    resumeStack: typeof profile.resumeStack === "string" ? profile.resumeStack : "",
    aiCache: (profile.aiCache && typeof profile.aiCache === "object") ? profile.aiCache : { jd: "", resume: "" }
  };
  // normalize so render code can rely on shapes
  out.jobs.forEach(normalizeJobShape);
  CS_TOPICS.forEach(t => { if (typeof out.csChecklist[t.key] !== "boolean") out.csChecklist[t.key] = false; });
  DIFFICULTIES.forEach(d => { if (typeof out.goals[d] !== "number") out.goals[d] = (d === "Easy" ? 50 : d === "Medium" ? 75 : 30); });
  return out;
}

function normalizeJobShape(j) {
  j.stack = parseStack(j.stack);
  j.subStages = Object.assign({ oa: false, phoneScreen: false, technical: false, systemDesign: false, behavioral: false }, j.subStages || {});
  if (!Array.isArray(j.history)) j.history = [];
  if (j.salary == null) j.salary = "";
  return j;
}

function cacheState() { try { localStorage.setItem(CACHE_KEY, JSON.stringify(STATE)); } catch (_) {} }
function readCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch (_) { return null; } }

/* Load everything from the API in parallel; fall back to offline cache. */
async function loadState() {
  try {
    const [jobs, contacts, leetcode, profile] = await Promise.all([
      apiCall("GET", "/jobs"),
      apiCall("GET", "/contacts"),
      apiCall("GET", "/leetcode"),
      apiCall("GET", "/profile")
    ]);
    OFFLINE = false;
    STATE = assembleState(jobs, contacts, leetcode, profile);
    cacheState();
    return STATE;
  } catch (e) {
    console.warn("API unreachable, using offline cache:", e.message);
    OFFLINE = true;
    const cached = readCache();
    STATE = cached || assembleState([], [], [], {});
    return STATE;
  }
}

/* Repository: each method calls the API, then patches STATE in place. */
const repo = {
  async createJob(payload) {
    const job = normalizeJobShape(await apiCall("POST", "/jobs", payload));
    STATE.jobs.unshift(job);
    return job;
  },
  async updateJob(id, payload) {
    const job = normalizeJobShape(await apiCall("PUT", "/jobs/" + id, payload));
    const i = STATE.jobs.findIndex(j => j.id === id);
    if (i >= 0) STATE.jobs[i] = job; else STATE.jobs.unshift(job);
    return job;
  },
  async moveJob(id, status) {
    const job = normalizeJobShape(await apiCall("PATCH", "/jobs/" + id + "/move", { status }));
    const i = STATE.jobs.findIndex(j => j.id === id);
    if (i >= 0) STATE.jobs[i] = job;
    return job;
  },
  async deleteJob(id) {
    await apiCall("DELETE", "/jobs/" + id);
    STATE.jobs = STATE.jobs.filter(j => j.id !== id);
    STATE.contacts.forEach(c => { if (c.jobId === id) c.jobId = null; });
  },
  async createContact(payload) {
    const c = await apiCall("POST", "/contacts", payload);
    STATE.contacts.unshift(c);
    return c;
  },
  async importContacts(list) {
    const result = await apiCall("POST", "/contacts/import", { contacts: list });
    (result.contacts || []).slice().reverse().forEach(c => STATE.contacts.unshift(c));
    return result; // { added, skipped, contacts }
  },
  async updateContact(id, payload) {
    const c = await apiCall("PUT", "/contacts/" + id, payload);
    const i = STATE.contacts.findIndex(x => x.id === id);
    if (i >= 0) STATE.contacts[i] = c;
    return c;
  },
  async deleteContact(id) {
    await apiCall("DELETE", "/contacts/" + id);
    STATE.contacts = STATE.contacts.filter(c => c.id !== id);
  },
  async createLeetcode(payload) {
    const p = await apiCall("POST", "/leetcode", payload);
    STATE.leetcode.push(p);
    return p;
  },
  async deleteLeetcode(id) {
    await apiCall("DELETE", "/leetcode/" + id);
    STATE.leetcode = STATE.leetcode.filter(p => p.id !== id);
  },
  async saveProfileNow(patch) {
    const profile = await apiCall("PUT", "/profile", patch);
    return profile;
  }
};

/* Debounced profile autosave (for AI scratchpad, goals, checklist, activeView). */
function scheduleSave(patch) {
  if (patch) Object.assign(pendingProfilePatch, patch);
  if (profileSaveTimer) clearTimeout(profileSaveTimer);
  profileSaveTimer = setTimeout(flushProfile, 400);
}
async function flushProfile() {
  const patch = pendingProfilePatch;
  if (!Object.keys(patch).length) return;
  pendingProfilePatch = {};
  try {
    await repo.saveProfileNow(patch);
    cacheState();
  } catch (e) {
    // re-merge the failed patch so it isn't lost; newer keystrokes win
    pendingProfilePatch = Object.assign(patch, pendingProfilePatch);
    if (!OFFLINE) toast("Could not save settings: " + e.message, "bad");
  }
}

/* commit = re-render + refresh the offline cache (server write already done). */
function commit(render) {
  cacheState();
  if (render !== false) renderActiveView();
  renderChrome();
}

/* Run an async mutation with a standard error toast. */
async function mutate(fn, errPrefix) {
  try { await fn(); commit(); }
  catch (e) { toast((errPrefix || "Action failed") + ": " + e.message, "bad"); }
}

/* ------------------------------ Toasts --------------------------------- */
function toast(msg, kind) {
  const root = document.getElementById("toastRoot");
  const colors = {
    good: "border-good/40 bg-good/10 text-good",
    bad: "border-bad/40 bg-bad/10 text-bad",
    info: "border-accent/40 bg-accent/10 text-accent",
    warn: "border-warn/40 bg-warn/10 text-warn"
  };
  const icons = {
    good: "M5 13l4 4L19 7",
    bad: "M6 18L18 6M6 6l12 12",
    info: "M12 8h.01M11 12h1v4h1",
    warn: "M12 9v4m0 4h.01"
  };
  const el = document.createElement("div");
  el.className = "toast-in flex items-start gap-3 px-4 py-3 rounded-xl border backdrop-blur bg-panel2/90 shadow-xl " + (colors[kind] || colors.info);
  el.innerHTML =
    '<svg class="w-5 h-5 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="' + (icons[kind] || icons.info) + '"/></svg>' +
    '<div class="text-sm leading-snug text-slate-100">' + escapeHtml(msg) + '</div>';
  root.appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity .25s, transform .25s";
    el.style.opacity = "0";
    el.style.transform = "translateX(24px)";
    setTimeout(() => el.remove(), 260);
  }, 2800);
}

/* ------------------------------ Modal ---------------------------------- */
function openModal(html, opts) {
  opts = opts || {};
  const root = document.getElementById("modalRoot");
  root.innerHTML =
    '<div class="fade-in w-full ' + (opts.size || "max-w-lg") + ' bg-panel rounded-2xl border border-line shadow-2xl max-h-[92vh] flex flex-col overflow-hidden">' + html + '</div>';
  root.classList.remove("hidden");
  root.classList.add("flex");
  const onBackdrop = (e) => { if (e.target === root) closeModal(); };
  root.onclick = onBackdrop;
  document.addEventListener("keydown", escClose);
}
function escClose(e) { if (e.key === "Escape") closeModal(); }
function closeModal() {
  const root = document.getElementById("modalRoot");
  root.classList.add("hidden");
  root.classList.remove("flex");
  root.innerHTML = "";
  root.onclick = null;
  document.removeEventListener("keydown", escClose);
}

/* ======================================================================
   NAVIGATION
   ====================================================================== */
const VIEWS = [
  { id: "board",     title: "Application Board",        sub: "Drag cards or use quick-move to update your pipeline.",
    icon: 'M4 5h16M4 5v14M4 5l4 0M20 5v14M9 5v14m6-14v14M4 19h16' },
  { id: "ai",        title: "AI Prep & JD Matcher",     sub: "Paste a job description + your stack to generate tailored prep.",
    icon: 'M9.5 3l1.5 4 4 1.5-4 1.5L9.5 14 8 10 4 8.5 8 7zM17 13l.9 2.4 2.4.9-2.4.9L17 20l-.9-2.4-2.4-.9 2.4-.9z' },
  { id: "prep",      title: "LeetCode & System Design", sub: "Track problems solved and tick off CS fundamentals.",
    icon: 'M4 6h16M4 12h16M4 18h10M18 16l2 2 2-2' },
  { id: "crm",       title: "Recruiter CRM (HR)",        sub: "Store HR contacts from your Claude + Apify flow and email them.",
    icon: 'M16 11a4 4 0 10-8 0 4 4 0 008 0zM3 21a7 7 0 0114 0M17 8h4m-2-2v4' },
  { id: "analytics", title: "Analytics Dashboard",       sub: "Live conversion telemetry, stack breakdown & 30-day velocity.",
    icon: 'M4 19V5m0 14h16M8 17v-5m4 5V9m4 8v-7' }
];

function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = VIEWS.map(v => {
    const active = STATE.activeView === v.id;
    return (
      '<button data-view="' + v.id + '" class="navbtn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm border border-transparent transition ' +
      (active ? "nav-active font-semibold" : "text-muted hover:text-white hover:bg-panel2") + '">' +
        '<svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="' + v.icon + '"/></svg>' +
        '<span class="hidden md:inline text-left leading-tight">' + escapeHtml(v.title) + '</span>' +
      '</button>'
    );
  }).join("");
  nav.querySelectorAll(".navbtn").forEach(b => {
    b.onclick = () => setView(b.getAttribute("data-view"));
  });
}

function setView(id) {
  STATE.activeView = id;
  scheduleSave({ activeView: id });
  renderNav();
  renderActiveView();
  const meta = VIEWS.find(v => v.id === id);
  if (meta) {
    document.getElementById("viewTitle").textContent = meta.title;
    document.getElementById("viewSub").textContent = meta.sub;
  }
}

/* renderChrome: header stats + nav highlight */
function renderChrome() {
  document.getElementById("statTotal").textContent = STATE.jobs.length;
  document.getElementById("statContacts").textContent = STATE.contacts.length;
}

function renderActiveView() {
  const host = document.getElementById("views");
  const v = STATE.activeView;
  if (v === "board") renderBoard(host);
  else if (v === "ai") renderAI(host);
  else if (v === "prep") renderPrep(host);
  else if (v === "crm") renderCRM(host);
  else if (v === "analytics") renderAnalytics(host);
  else renderBoard(host);
}

/* ======================================================================
   VIEW 1 — KANBAN BOARD
   ====================================================================== */
function jobsByStatus(status) {
  return STATE.jobs.filter(j => j.status === status);
}

async function moveJob(jobId, toStatus) {
  const job = STATE.jobs.find(j => j.id === jobId);
  if (!job || job.status === toStatus || !COLUMN_IDS.includes(toStatus)) return;
  const label = job.company || "Card";
  try {
    await repo.moveJob(jobId, toStatus);
    commit();
    toast(escapeHtml(label) + " → " + COLUMN_LABEL[toStatus], "info");
  } catch (e) {

let dragId = null;
function wireBoard(host) {
  // quick-move + edit buttons
  host.querySelectorAll("[data-act]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.getAttribute("data-id");
      const act = btn.getAttribute("data-act");
      const job = STATE.jobs.find(j => j.id === id);
      if (!job) return;
      const idx = COLUMN_IDS.indexOf(job.status);
      if (act === "move-prev" && idx > 0) moveJob(id, COLUMN_IDS[idx - 1]);
      else if (act === "move-next" && idx < COLUMN_IDS.length - 1) moveJob(id, COLUMN_IDS[idx + 1]);
      else if (act === "edit") openJobModal(job);
    };
  });
  // open detail on card body click
  host.querySelectorAll(".jobcard").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("[data-act]")) return;
      const job = STATE.jobs.find(j => j.id === card.getAttribute("data-id"));
      if (job) openJobModal(job);
    });
    // drag events
    card.addEventListener("dragstart", (e) => {
      dragId = card.getAttribute("data-id");
      card.classList.add("card-dragging");
      try { e.dataTransfer.setData("text/plain", dragId); e.dataTransfer.effectAllowed = "move"; } catch (_) {}
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("card-dragging");
      dragId = null;
      host.querySelectorAll(".kdrop").forEach(d => d.classList.remove("col-dragover"));
    });
  });
  // drop zones
  host.querySelectorAll(".kdrop").forEach(zone => {
    zone.addEventListener("dragover", (e) => { e.preventDefault(); try { e.dataTransfer.dropEffect = "move"; } catch (_) {} zone.classList.add("col-dragover"); });
    zone.addEventListener("dragleave", (e) => { if (!zone.contains(e.relatedTarget)) zone.classList.remove("col-dragover"); });
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("col-dragover");
      let id = dragId;
      try { id = e.dataTransfer.getData("text/plain") || dragId; } catch (_) {}
      const to = zone.getAttribute("data-col");
      if (id && to) moveJob(id, to);
    });
  });
}

const STOPWORDS = new Set(["the","and","for","with","you","your","our","are","will","that","this","have","from","who","what","when","where","into","across","over","their","them","they","using","use","used","work","working","team","teams","build","building","help","make","including","etc","new","role","roles","strong","plus","years","year","experience","ability","able","skills","skill","knowledge","understanding","good","great","excellent","must","should","would","candidate","candidates","looking","seeking","join","within","while","also","such","like","well","more","most","many","ensure","drive","deliver","develop","developing","design","designing","based","across","per","via"]);

function tokenize(text) {
  return String(text || "").toLowerCase().match(/[a-z0-9][a-z0-9+#.\-]*/g) || [];
}
function escapeRe(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
/* word-aware presence: skill must not be flanked by alphanumerics ("go" ≠ "django") */
function skillPresent(text, skill) {
  try {
    const re = new RegExp("(?:^|[^a-z0-9])" + escapeRe(String(skill).toLowerCase()) + "(?![a-z0-9])", "i");
    return re.test(String(text).toLowerCase());
  } catch (e) { return String(text).toLowerCase().includes(String(skill).toLowerCase()); }
}
function topKeywords(text, n) {
  const counts = {};
  tokenize(text).forEach(w => {
    const clean = w.replace(/[.\-]+$/, "");
    if (clean.length < 3 || STOPWORDS.has(clean)) return;
    counts[clean] = (counts[clean] || 0) + 1;
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, n).map(e => e[0]);
}
function matchRules(rules, lowerJd) {
  const hits = [];
  rules.forEach(r => {
    const found = r.kw.find(k => lowerJd.includes(k));
    if (found) hits.push({ topic: r.topic, why: r.why, trigger: found });
  });
  // dedupe by topic
  const seen = new Set();
  return hits.filter(h => { if (seen.has(h.topic)) return false; seen.add(h.topic); return true; });
}
const KNOWN_SKILLS = ["react","angular","vue","svelte","typescript","javascript","node.js","node","python","java","go","golang","rust","c++","c#","ruby","php","kotlin","swift","scala",
  "aws","gcp","azure","docker","kubernetes","terraform","graphql","grpc","rest","postgresql","postgres","mysql","mongodb","dynamodb","redis","kafka","rabbitmq","elasticsearch",
  "spark","hadoop","tensorflow","pytorch","next.js","nextjs","express","django","flask","spring","rails","tailwind","redux","webpack","vite","ci/cd","jenkins","git","linux","sql","nosql"];
/* longer skills first so "node.js"/"postgresql" win over "node"/"postgres" substrings */
const KNOWN_SORTED = KNOWN_SKILLS.slice().sort((a, b) => b.length - a.length);
function skillMatch(resume, jd) {
  const seenJd = new Set();
  const inJd = [];
  KNOWN_SORTED.forEach(k => {
    if (skillPresent(jd, k) && !seenJd.has(k)) { seenJd.add(k); inJd.push(k); }
  });
  const matched = inJd.filter(k => skillPresent(resume, k));
  const gaps = inJd.filter(k => !matched.includes(k));
  return { matched: [...new Set(matched)], gaps: [...new Set(gaps)], inJd: [...new Set(inJd)] };
}
function guessCompany(jd) {
  const m = String(jd).match(/(?:at|join|with)\s+([A-Z][A-Za-z0-9&.\- ]{1,28})(?:[.,!\n]|'s|\s+is\b|\s+we\b)/);
  if (m) return m[1].trim().replace(/\s+(is|we|are|team)$/i, "").trim();
  return "";
}
function guessRole(jd) {
  const text = String(jd);
  // 1) qualified role (e.g. "Senior Backend Engineer", "Full-Stack Developer")
  let m = text.match(/((?:senior|staff|principal|lead|junior|sr\.?|jr\.?|entry[\- ]?level)\s+)?((?:software|frontend|front[\- ]end|backend|back[\- ]end|full[\- ]?stack|mobile|ios|android|data|ml|machine learning|platform|devops|site reliability|cloud|web|security|embedded)\s+)(engineer|developer|sde\b|programmer)/i);
  if (m) return m[0].replace(/\s+/g, " ").trim();
  // 2) bare "Software Engineer" / "Developer" / "SDE"
  m = text.match(/((?:senior|staff|principal|lead|junior)\s+)?(software\s+engineer|developer|engineer|sde\b)/i);
  if (m) return m[0].replace(/\s+/g, " ").trim();
  return "Software Engineer";
}

  if (matched.length) matched.forEach(s => lines.push("  • " + s.toUpperCase() + " — give one shipped example using it."));

  lines.push("");
  if (gaps.length) {
    lines.push("GAPS TO ADDRESS PROACTIVELY (" + gaps.map(g => g.toUpperCase()).join(", ") + "):");
    lines.push("  • Show adjacent experience or a fast-ramp story — don't hide the gap, frame the learning curve.");
    lines.push("");
  }
  lines.push("WHY " + company.toUpperCase() + " — show you researched the product, team, or engineering culture.");
  lines.push("");
  lines.push("CLOSE — restate fit in one line and request the conversation.");
  lines.push("");
  lines.push("Built with: " + strengths + ".");
  lines.push("Best regards,");
  lines.push("[Your Name]");

}

function runAIGenerate(jd, resume) {
  const out = document.getElementById("aiOut");
  if (!out) return;
  if (!jd.trim()) { toast("Paste a job description first.", "warn"); return; }

  const lowerJd = jd.toLowerCase();
  const algo = matchRules(ALGO_RULES, lowerJd);
  const sys = matchRules(SYSDESIGN_RULES, lowerJd);
  const sm = skillMatch(resume, jd);
  const keywords = topKeywords(jd, 12);
  const company = guessCompany(jd);
  const role = guessRole(jd);
  const cover = generateCoverLetter(jd, resume, { company, role, matched: sm.matched, gaps: sm.gaps, keywords });

  const matchPct = sm.inJd.length ? Math.round((sm.matched.length / sm.inJd.length) * 100) : 0;

  const chip = (text, cls) => '<span class="text-xs px-2 py-1 rounded-md ' + cls + '">' + escapeHtml(text) + '</span>';

  ).join("") : '<div class="text-sm text-muted">No strong algorithmic signals detected — default to Arrays, Hashing, Two Pointers, and Trees.</div>';

  const sysHTML = sys.length ? sys.map(a =>

    '<div class="text-xs text-muted mt-1">' + escapeHtml(a.why) + '</div>' +
    '<div class="text-[10px] font-mono text-accent2 mt-1">matched: "' + escapeHtml(a.trigger) + '"</div></div>'
  ).join("") : '<div class="text-sm text-muted">No strong system-design signals — prepare a general scalable web service (LB → stateless app → cache → sharded DB).</div>';

  out.innerHTML =
    '<div class="fade-in grid lg:grid-cols-2 gap-4">' +
      // Summary card
      '<div class="lg:col-span-2 bg-panel rounded-2xl border border-line p-4">' +
        '<div class="flex flex-wrap items-center justify-between gap-3">' +
          '<div><div class="text-xs text-muted uppercase tracking-wide font-semibold">Detected Target</div>' +
            '<div class="text-lg font-bold text-white">' + escapeHtml(role) + (company ? ' <span class="text-muted">@ ' + escapeHtml(company) + '</span>' : "") + '</div></div>' +
          '<div class="text-right"><div class="text-xs text-muted uppercase tracking-wide font-semibold">Stack Match</div>' +
            '<div class="text-2xl font-bold ' + (matchPct >= 60 ? "text-good" : matchPct >= 30 ? "text-warn" : "text-bad") + '">' + matchPct + '%</div></div>' +
        '</div>' +
        '<div class="mt-3"><div class="text-[11px] uppercase tracking-wide text-muted font-semibold mb-1">Matched skills</div>' +
          '<div class="flex flex-wrap gap-1.5">' + (sm.matched.length ? sm.matched.map(s => chip(s, "bg-good/15 text-good border border-good/30")).join("") : '<span class="text-xs text-muted">none — add these to your resume summary</span>') + '</div></div>' +
        (sm.gaps.length ? '<div class="mt-3"><div class="text-[11px] uppercase tracking-wide text-muted font-semibold mb-1">Gaps to address</div>' +
          '<div class="flex flex-wrap gap-1.5">' + sm.gaps.map(s => chip(s, "bg-bad/15 text-bad border border-bad/30")).join("") + '</div></div>' : "") +
        '<div class="mt-3"><div class="text-[11px] uppercase tracking-wide text-muted font-semibold mb-1">Top JD keywords</div>' +

}

function copyText(text, okMsg) {
  const done = () => toast(okMsg || "Copied.", "good");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); done(); } catch (e) { toast("Copy failed — select manually.", "bad"); }
  ta.remove();
}

/* ---- Import parser: JSON array OR free-form key:value blocks ----
   Parses client-side, then POSTs to /contacts/import which dedupes + stores
   in MongoDB and returns the inserted documents (with real ids). ---- */
async function importContacts(raw) {
  raw = String(raw || "").trim();
  if (!raw) { toast("Paste contact data first.", "warn"); return; }
  let parsed = [];

  // try JSON first — only treat as JSON if it yields an array/object of records
  let jsonOk = false;
  try {
    const data = JSON.parse(raw);
    const arr = Array.isArray(data) ? data
      : (data && typeof data === "object") ? [data]
      : null; // primitives (string/number/bool/null) fall through to text parser
    if (arr) {
      parsed = arr.filter(x => x && typeof x === "object").map(normalizeImported).filter(c => c.name || c.email);
      jsonOk = true;
    }
  } catch (e) { jsonOk = false; }

  // fallback: free-form text blocks separated by blank lines
  if (!jsonOk) {
    const blocks = raw.split(/\n\s*\n/);
    blocks.forEach(block => {
      const obj = {};
      block.split(/\n/).forEach(line => {
        // key may contain letters, spaces, hyphens, underscores, slashes (E-mail, phone_number, Job/Title)
        const m = line.match(/^\s*([A-Za-z][A-Za-z _\-\/]*?)\s*[:\-=]\s*(.+)$/);
        if (m) {
          const key = m[1].trim().toLowerCase().replace(/[_\-\/]+/g, "");
          const val = m[2].trim();
          if (/name/.test(key) && !/company|user/.test(key)) obj.name = val;
          else if (/title|role|position/.test(key)) obj.title = val;
          else if (/company|org/.test(key)) obj.company = val;
          else if (/e-?mail/.test(key)) obj.email = val;
          else if (/phone|tel|mobile/.test(key)) obj.phone = val;
          else if (/linkedin|profile|url|link/.test(key)) obj.linkedin = val;
          else if (/note|comment/.test(key)) obj.notes = val;
          else if (/source/.test(key)) obj.source = val;
        }
      });
      // also scrape a bare email if none captured
      if (!obj.email) { const em = block.match(/[^\s@]+@[^\s@]+\.[^\s@]+/); if (em) obj.email = em[0]; }
      if (obj.name || obj.email) parsed.push(normalizeImported(obj));
    });
  }

  if (!parsed.length) { toast("Could not parse any contacts. Check the format.", "bad"); return; }

  // server dedupes (by email, else name+company) and persists to MongoDB
  try {
    const result = await repo.importContacts(parsed);
    commit();
    const box = document.getElementById("importBox");
    if (box) box.value = "";
    const added = result.added || 0, skipped = result.skipped || 0;
    toast("Imported " + added + " contact" + (added === 1 ? "" : "s") + (skipped ? " · " + skipped + " duplicate skipped" : "") + ".", added ? "good" : "warn");
  } catch (err) {
    toast("Import failed: " + err.message, "bad");
  }
}

function normalizeImported(o) {
  o = o || {};
  // tolerate varied key casings from connectors
  const pick = (...keys) => {
    for (const k of keys) {
      for (const actual in o) {
        if (actual.toLowerCase().replace(/[^a-z0-9]/g, "") === k) return o[actual];
      }
    }
    return "";
  };
  return {
    id: uid("hr"),
    name: String(pick("name", "fullname", "contactname") || o.name || "").trim(),
    title: String(pick("title", "role", "position", "jobtitle") || "").trim(),
    company: String(pick("company", "organization", "org", "employer") || "").trim(),
    email: String(pick("email", "emailaddress", "mail") || "").trim(),
    phone: String(pick("phone", "phonenumber", "tel", "mobile") || "").trim(),
    linkedin: String(pick("linkedin", "linkedinurl", "profile", "profileurl") || "").trim(),
    source: String(pick("source") || "Apify / Claude connector").trim(),
    notes: String(pick("notes", "note", "comment", "comments") || "").trim(),
    jobId: null,
    dateAdded: nowISO()
  };
}

/* ---- Email composer (deterministic, mailto + copy) ---- */
function buildOutreachEmail(contact, job) {
  const recruiter = (contact.name || "there").split(/\s+/)[0];
  const company = contact.company || (job ? job.company : "your company");
  const role = job ? job.role + " role" : "a software engineering role";
  const stack = job && job.stack.length ? job.stack.join(", ") :
    parseStack(STATE.resumeStack).slice(0, 5).join(", ");
  const subject = "Interest in " + (job ? job.role + " opportunities" : "engineering opportunities") + " at " + company;
  const lines = [];
  lines.push("Hi " + recruiter + ",");
  lines.push("");
  lines.push("I came across " + (job ? "the " + role : "engineering openings") + " at " + company +
    " and wanted to reach out directly. I'm a software engineer with hands-on experience in " +
    (stack || "modern full-stack development") + ".");
  lines.push("");
  lines.push("A few quick highlights:");
  lines.push("  • [Impact metric — e.g. cut p99 latency 40% on a service handling 2M req/day]");
  lines.push("  • [Relevant project that maps to " + company + "'s stack or product]");
  lines.push("  • [Ownership example — shipped a feature end-to-end]");
  lines.push("");
  if (job && job.referral === "Have Referral") {
    lines.push("I was referred by a contact on the team and would love to formally start the conversation.");
    lines.push("");
  }
  lines.push("Would you have 15 minutes this week to chat about how I could contribute? I'm happy to share my resume and portfolio.");
  lines.push("");
  lines.push("Best regards,");
  lines.push("[Your Name]");
  lines.push("[Phone] · [Email] · [LinkedIn/GitHub]");
  return { subject, body: lines.join("\n") };
}

/* ======================================================================
   VIEW 5 — ANALYTICS DASHBOARD
   ====================================================================== */
function renderAnalytics(host) {
  const total = STATE.jobs.length;
  const counts = {};
  COLUMN_IDS.forEach(id => counts[id] = jobsByStatus(id).length);

  const applied = counts.applied + counts.interviewing + counts.offer + counts.rejected; // anything that left wishlist
  const reachedInterview = counts.interviewing + counts.offer; // currently/most-advanced
  // conversion = of everything we applied to, how many reached interviewing-or-beyond (use history for accuracy)
  let everApplied = 0, everInterviewed = 0, everOffer = 0;
  STATE.jobs.forEach(j => {
    const stages = new Set([j.status, ...j.history.map(h => h.to), ...j.history.map(h => h.from)]);
    if (stages.has("applied") || stages.has("interviewing") || stages.has("offer") || stages.has("rejected")) everApplied++;
    if (stages.has("interviewing") || stages.has("offer")) everInterviewed++;
    if (stages.has("offer")) everOffer++;
  });
  const convInterview = everApplied ? Math.round((everInterviewed / everApplied) * 100) : 0;
  const convOffer = everInterviewed ? Math.round((everOffer / everInterviewed) * 100) : 0;

  // stack breakdown
  const stackCounts = {};
  STATE.jobs.forEach(j => j.stack.forEach(s => { const k = s.trim(); if (k) stackCounts[k] = (stackCounts[k] || 0) + 1; }));
  const topStacks = Object.entries(stackCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxStack = topStacks.length ? topStacks[0][1] : 1;

  // role breakdown
  const roleCounts = {};
  STATE.jobs.forEach(j => { roleCounts[j.role] = (roleCounts[j.role] || 0) + 1; });

  // 30-day velocity: applications added per day (by dateAdded) + status moves
  const days = 30;
  const addedPerDay = new Array(days).fill(0);
  const movesPerDay = new Array(days).fill(0);
  const start = daysAgo(days - 1).getTime();
  STATE.jobs.forEach(j => {
    const d = new Date(j.dateAdded); d.setHours(0, 0, 0, 0);
    const idx = Math.floor((d.getTime() - start) / 86400000);
    if (idx >= 0 && idx < days) addedPerDay[idx]++;
    j.history.forEach(h => {
      const hd = new Date(h.ts); hd.setHours(0, 0, 0, 0);
      const hidx = Math.floor((hd.getTime() - start) / 86400000);
      if (hidx >= 0 && hidx < days) movesPerDay[hidx]++;
    });
  });
  const maxVel = Math.max(1, Math.max.apply(null, addedPerDay.concat(movesPerDay)));

  const metric = (label, value, sub, color) =>
    '<div class="bg-panel rounded-2xl border border-line p-4">' +
      '<div class="text-[11px] uppercase tracking-wide text-muted font-semibold">' + label + '</div>' +
      '<div class="text-3xl font-bold mt-1 ' + (color || "text-white") + '">' + value + '</div>' +
      '<div class="text-xs text-muted mt-1">' + sub + '</div>' +
    '</div>';

  const funnelBar = (label, n, color) => {
    const pct = total ? clampNum(Math.round((n / total) * 100), 0, 100) : 0;
    return '<div><div class="flex justify-between text-xs mb-1"><span class="text-slate-300">' + escapeHtml(label) + '</span><span class="font-mono text-muted">' + n + '</span></div>' +
      '<div class="h-3 rounded-full bg-ink overflow-hidden"><div class="h-full rounded-full transition-all" style="width:' + Math.max(pct, n ? 4 : 0) + '%;background:' + color + '"></div></div></div>';
  };

  const velBars = addedPerDay.map((v, i) => {
    const h = Math.round((v / maxVel) * 100);
    const m = Math.round((movesPerDay[i] / maxVel) * 100);
    const date = new Date(start + i * 86400000);
    const lbl = date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    return '<div class="flex-1 flex flex-col items-center justify-end gap-0.5 group relative" style="min-width:6px">' +
      '<div class="w-full flex flex-col justify-end gap-px" style="height:120px">' +
        '<div class="w-full rounded-t bg-accent2/70" style="height:' + m + '%"></div>' +
        '<div class="w-full rounded-t bg-accent" style="height:' + h + '%"></div>' +
      '</div>' +
      '<div class="absolute -top-7 hidden group-hover:block bg-ink border border-line rounded px-1.5 py-0.5 text-[10px] text-white whitespace-nowrap z-10">' + lbl + ': ' + v + ' added, ' + movesPerDay[i] + ' moves</div>' +
      '</div>';
  }).join("");

  const stackHTML = topStacks.length ? topStacks.map(([name, n]) => {
    const pct = clampNum(Math.round((n / maxStack) * 100), 6, 100);
    return '<div class="flex items-center gap-2"><span class="text-xs text-slate-300 w-24 truncate">' + escapeHtml(name) + '</span>' +
      '<div class="flex-1 h-2.5 rounded-full bg-ink overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-accent to-accent2" style="width:' + pct + '%"></div></div>' +
      '<span class="text-xs font-mono text-muted w-5 text-right">' + n + '</span></div>';
  }).join("") : '<div class="text-xs text-muted">Add tech stacks to your applications to see this breakdown.</div>';

  const roleHTML = Object.entries(roleCounts).sort((a, b) => b[1] - a[1]).map(([r, n]) =>
    '<span class="text-xs px-2.5 py-1 rounded-lg bg-panel2 border border-line text-slate-300">' + escapeHtml(r) + ' <span class="font-mono text-accent">' + n + '</span></span>').join("") ||
    '<span class="text-xs text-muted">No roles yet.</span>';

  host.innerHTML =
    '<div class="h-full overflow-y-auto p-4 md:p-6"><div class="max-w-6xl mx-auto space-y-4">' +
      '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">' +
        metric("Total Applications", total, COLUMN_IDS.map(id => COLUMN_LABEL[id] + ": " + counts[id]).slice(0, 2).join(" · "), "text-white") +
        metric("Apply → Interview", convInterview + "%", everInterviewed + " of " + everApplied + " applications", convInterview >= 30 ? "text-good" : convInterview > 0 ? "text-warn" : "text-muted") +
        metric("Interview → Offer", convOffer + "%", everOffer + " offer" + (everOffer === 1 ? "" : "s") + " from " + everInterviewed + " interviews", convOffer >= 30 ? "text-good" : convOffer > 0 ? "text-warn" : "text-muted") +
        metric("Active Pipeline", (counts.applied + counts.interviewing + counts.offer), "in play (excl. wishlist & rejected)", "text-accent") +
      '</div>' +
      '<div class="grid lg:grid-cols-3 gap-4">' +
        '<div class="bg-panel rounded-2xl border border-line p-4">' +
          '<h3 class="font-semibold text-white text-sm mb-3">Pipeline Funnel</h3>' +
          '<div class="space-y-3">' +
            funnelBar("Wishlist", counts.wishlist, "#8aa0bd") +
            funnelBar("Applied", counts.applied, "#5b8cff") +
            funnelBar("Interviewing", counts.interviewing, "#fbbf24") +
            funnelBar("Offer", counts.offer, "#34d399") +
            funnelBar("Rejected", counts.rejected, "#f87171") +
          '</div>' +
        '</div>' +
        '<div class="bg-panel rounded-2xl border border-line p-4">' +
          '<h3 class="font-semibold text-white text-sm mb-3">Targeted Tech Stacks</h3>' +
          '<div class="space-y-2">' + stackHTML + '</div>' +
        '</div>' +
        '<div class="bg-panel rounded-2xl border border-line p-4">' +
          '<h3 class="font-semibold text-white text-sm mb-3">Roles Targeted</h3>' +
          '<div class="flex flex-wrap gap-2">' + roleHTML + '</div>' +
          '<h3 class="font-semibold text-white text-sm mb-2 mt-4">Snapshot</h3>' +
          '<div class="space-y-1.5 text-xs text-muted">' +
            '<div class="flex justify-between"><span>HR contacts stored</span><span class="font-mono text-white">' + STATE.contacts.length + '</span></div>' +
            '<div class="flex justify-between"><span>LeetCode solved</span><span class="font-mono text-white">' + STATE.leetcode.length + '</span></div>' +
            '<div class="flex justify-between"><span>CS topics done</span><span class="font-mono text-white">' + CS_TOPICS.filter(t => STATE.csChecklist[t.key]).length + '/' + CS_TOPICS.length + '</span></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="bg-panel rounded-2xl border border-line p-4">' +
        '<div class="flex items-center justify-between mb-3"><h3 class="font-semibold text-white text-sm">Rolling 30-Day Velocity</h3>' +
          '<div class="flex items-center gap-4 text-xs"><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm bg-accent"></span>Added</span>' +
          '<span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm bg-accent2/70"></span>Status moves</span></div></div>' +
        '<div class="flex items-end gap-0.5 overflow-x-auto pb-1">' + velBars + '</div>' +
        '<div class="text-[10px] text-muted mt-1 flex justify-between"><span>' + new Date(start).toLocaleDateString(undefined, { month: "short", day: "numeric" }) + '</span><span>Today</span></div>' +
      '</div>' +
    '</div></div>';
}

/* ======================================================================
   GLOBAL CHROME: header buttons, export/import/reset
   ====================================================================== */
function exportData() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "devhunt-backup-" + todayStr() + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Backup exported.", "good");
}
function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    let parsed;
    try { parsed = JSON.parse(reader.result); }
    catch (e) { toast("Invalid JSON file.", "bad"); return; }
    try {
      await apiCall("POST", "/restore", parsed);
      await reloadAndRender();
      toast("Data imported & saved to MongoDB.", "good");
    } catch (e) {
      toast("Import failed: " + e.message, "bad");
    }
  };
  reader.onerror = () => toast("Could not read file.", "bad");
  reader.readAsText(file);
}

async function reloadAndRender() {
  await loadState();
  renderNav();
  renderChrome();
  setHeaderForView(STATE.activeView);
  renderActiveView();
}

function setHeaderForView(id) {
  const meta = VIEWS.find(v => v.id === id) || VIEWS[0];
  document.getElementById("viewTitle").textContent = meta.title;
  document.getElementById("viewSub").textContent = meta.sub;
}

function wireGlobalChrome() {
  document.getElementById("addJobBtn").onclick = () => openJobModal(null);
  document.getElementById("exportBtn").onclick = exportData;
  document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) importDataFromFile(f);
    e.target.value = "";
  };
  document.getElementById("resetBtn").onclick = async () => {
    if (confirm("Reset ALL data back to the seeded demo state? This erases your saved applications, contacts, and progress in MongoDB.")) {
      try {
        await apiCall("POST", "/reset");
        await reloadAndRender();
        toast("Data reset to demo state.", "warn");
      } catch (e) { toast("Reset failed: " + e.message, "bad"); }
    }
  };
}

/* If we booted (or fell) into offline mode, retry the API and re-sync once it's
   reachable again — on the browser 'online' event and via a light poll. */
let reconnectTimer = null;
function watchForReconnect() {
  const tryResync = async () => {
    if (!OFFLINE) return;
    try {
      await apiCall("GET", "/health");
      await reloadAndRender();
      if (!OFFLINE) toast("Reconnected — synced with the server.", "good");
    } catch (_) { /* still offline */ }
  };
  window.addEventListener("online", tryResync);
  if (!reconnectTimer) reconnectTimer = setInterval(() => { if (OFFLINE) tryResync(); }, 15000);
}

/* ------------------------------ Boot ----------------------------------- */
async function boot() {
  wireGlobalChrome();
  await loadState();
  if (OFFLINE) toast("Offline — showing cached data. Will sync when the server is reachable.", "warn");
  watchForReconnect();
  renderNav();
  renderChrome();
  setHeaderForView(STATE.activeView);
  renderActiveView();
  // flush any pending profile autosave before the tab closes. A normal fetch is
  // unreliable during unload, so use sendBeacon which the browser guarantees to send.
  window.addEventListener("beforeunload", () => {
    if (!Object.keys(pendingProfilePatch).length) return;
    try {
      const blob = new Blob([JSON.stringify(pendingProfilePatch)], { type: "application/json" });
      if (navigator.sendBeacon && navigator.sendBeacon(API + "/profile/beacon", blob)) {
        pendingProfilePatch = {};
        return;
      }
    } catch (_) {}
    flushProfile(); // best-effort fallback
  });
}
document.addEventListener("DOMContentLoaded", boot);
</script>
