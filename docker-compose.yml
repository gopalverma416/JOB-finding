# Run the whole stack (app + MongoDB) with one command:
#   docker compose up --build
# then open http://localhost:4000
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/devhunt
      PORT: "4000"
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
